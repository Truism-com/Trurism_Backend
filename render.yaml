# Render manifest for Travel Booking Platform
# Using Supabase PostgreSQL Database (external)
# See https://render.com/docs/deploying-with-manifest for details

services:
  - type: web
    name: travel-booking-api
    plan: free
    dockerfilePath: Dockerfile
    env: docker
    # Using Supabase PostgreSQL - database is hosted externally
    # Migrations run on startup via startup script in Dockerfile
    healthCheckPath: /health
    envVars:
      # ⚠️ IMPORTANT: Set this manually in Render dashboard after deployment!
      # Get from Supabase: Project Settings → Database → Connection string (URI)
      # Use the POOLER connection (port 6543) for better performance:
      # postgresql://postgres.[PROJECT-REF]:[PASSWORD]@aws-0-[REGION].pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false  # Must be set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      # Redis URL - create Redis instance in Render dashboard and set manually
      # Or use external Redis service
      - key: REDIS_URL
        value: ""  # Set this manually in Render dashboard after creating Redis
      - key: RAZORPAY_KEY_ID
        sync: false  # Set manually in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false  # Set manually in Render dashboard
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false  # Set manually from Razorpay Dashboard > Webhooks
      - key: CELERY_BROKER_URL
        sync: false  # Set manually if using Celery
      - key: CELERY_RESULT_BACKEND
        sync: false  # Set manually if using Celery

  # CELERY WORKER - DISABLED UNTIL REDIS IS CONFIGURED
  # Uncomment and configure after setting up Redis
  # - type: worker
  #   name: travel-booking-worker
  #   plan: free
  #   dockerfilePath: Dockerfile
  #   env: docker
  #   # Correct command: celery -A app.celery.celery_app worker --loglevel=info
  #   startCommand: "celery -A app.celery.celery_app worker --loglevel=info"
  #   envVars:
  #     - key: DATABASE_URL
  #       sync: false
  #     - key: REDIS_URL
  #       value: ""  # Set this manually in Render dashboard
  #     - key: CELERY_BROKER_URL
  #       sync: false
  #     - key: CELERY_RESULT_BACKEND
  #       sync: false

# ⚠️ DATABASE SECTION REMOVED - Using Supabase PostgreSQL instead
# No need to create a database in Render since we're using external Supabase
# databases:
#   - name: travel-booking-db
#     plan: starter

# Note: Render doesn't support managed Redis via manifest at the time of writing
# Steps to set up Redis:
# 1. Create a Redis instance in Render dashboard (or use external Redis service)
# 2. Copy the Redis connection URL
# 3. Set REDIS_URL environment variable in both services
# 4. Set CELERY_BROKER_URL and CELERY_RESULT_BACKEND if using Celery

